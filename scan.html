<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kivo Loop — Escanear</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
:root{
  --bg:#0A0F1F;
  --surface:#12182B;
  --card:#1A2238;
  --grad:linear-gradient(135deg,#00C2FF,#6A5CFF,#FF2D95);
  --blue:#00C2FF;
  --purple:#6A5CFF;
  --pink:#FF2D95;
  --green:#22c55e;
  --red:#ef4444;
  --gray:#A0A7B8;
  --muted:#6B7280;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif;}
body{background:var(--bg);color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:20px;}
.logo{height:36px;object-fit:contain;}
.title{font-size:15px;color:var(--gray);font-weight:500;text-align:center;}
#reader{width:min(300px,90vw);border-radius:16px;overflow:hidden;box-shadow:0 0 40px rgba(0,194,255,0.1);}
#reader video{border-radius:16px;}
.status{font-size:12px;color:var(--muted);text-align:center;}
.result{background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.3);border-radius:16px;padding:24px;text-align:center;display:none;animation:pop .3s ease;width:min(300px,90vw);}
.result.show{display:block;}
.result-icon{font-size:52px;margin-bottom:10px;}
.result-title{font-size:22px;font-weight:800;color:var(--green);margin-bottom:4px;}
.result-sub{font-size:14px;color:var(--gray);}
.error-box{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.3);border-radius:14px;padding:14px;text-align:center;display:none;width:min(300px,90vw);}
.error-box.show{display:block;font-size:13px;color:var(--red);}
.prize{background:rgba(106,92,255,0.08);border:1px solid rgba(106,92,255,0.3);border-radius:14px;padding:14px;text-align:center;display:none;width:min(300px,90vw);}
.prize.show{display:block;}
.prize-text{font-weight:700;font-size:15px;margin-top:6px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.back-btn{padding:12px 36px;background:transparent;color:var(--muted);border:1px solid rgba(255,255,255,0.1);border-radius:30px;font-size:13px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s;}
.back-btn:hover{border-color:var(--blue);color:var(--blue);}
@keyframes pop{from{transform:scale(0.85);opacity:0}to{transform:scale(1);opacity:1}}
</style>
</head>
<body>

<img class="logo" src="https://static.wixstatic.com/media/bc23e3_3e6ca2afbf894d55ad62fda9c54b1e7f~mv2.png" alt="Kivo Loop">
<div class="title">Apunta al QR del cajero</div>

<div id="reader"></div>

<div class="status" id="status">Iniciando cámara...</div>

<div class="result" id="result">
  <div class="result-icon">🎉</div>
  <div class="result-title">¡Sello obtenido!</div>
  <div class="result-sub" id="resultSub"></div>
</div>

<div class="error-box" id="errorBox"></div>

<div class="prize" id="prize">
  <div style="font-size:26px;">🏆</div>
  <div class="prize-text" id="prizeText"></div>
</div>

<button class="back-btn" onclick="stopAndBack()">Cerrar</button>

<script>
const API = 'https://loyalty-backend-production-204b.up.railway.app/api';
const params = new URLSearchParams(window.location.search);
const token = params.get('token') || '';
let scanner = null;
let scanned = false;

function start() {
  scanner = new Html5Qrcode('reader');
  scanner.start(
    { facingMode: 'environment' },
    { fps: 10, qrbox: { width: 240, height: 240 } },
    (decodedText) => {
      if (scanned) return;
      scanned = true;
      scanner.stop().then(() => {
        document.getElementById('status').textContent = 'Procesando...';
        submitScan(decodedText.trim());
      });
    },
    () => {}
  ).then(() => {
    document.getElementById('status').textContent = 'Apunta al QR del cajero';
  }).catch(err => {
    document.getElementById('status').textContent = 'Error accediendo a la cámara';
  });
}

function stopAndBack() {
  if (scanner) { scanner.stop().catch(() => {}); }
  window.close();
}

async function submitScan(secret) {
  try {
    const res = await fetch(`${API}/customer/scan`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ secret })
    });
    const data = await res.json();
    if (res.ok && data.ok) {
      document.getElementById('resultSub').textContent = data.totalStamps + ' sellos acumulados';
      document.getElementById('result').classList.add('show');
      document.getElementById('reader').style.display = 'none';
      document.getElementById('status').textContent = '';
      if (data.milestonesReached && data.milestonesReached.length > 0) {
        document.getElementById('prizeText').textContent = '¡Premio alcanzado: ' + data.milestonesReached[0].prizeName + '!';
        document.getElementById('prize').classList.add('show');
      }
      setTimeout(() => window.close(), 4000);
    } else {
      showError(data.error || 'QR inválido o expirado');
      scanned = false;
    }
  } catch(e) {
    showError('Error de conexión');
    scanned = false;
  }
}

function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 4000);
}

start();
</script>
</body>
</html>
